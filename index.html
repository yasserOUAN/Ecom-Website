<!DOCTYPE html>
<!-- ============================================================
     E-Commerce Platform — Authentication Page
     WAD Homework L2 2025/2026 — UMBB
     ============================================================
     This is the login page. Users must enter valid credentials
     to access the store. JS handles client-side validation.
     ============================================================ -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to LuxeCart — Your premium online shopping destination for electronics, clothing, and books.">
  <title>LuxeCart — Sign In</title>
  <!-- External CSS stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════
       HEADER SECTION (same as main page and category pages)
       - Logo (left-aligned) with shopping cart SVG icon
       - Store name (center-aligned)
       - Background image overlay via CSS
       ══════════════════════════════════════════════════════════ -->
  <header class="site-header">
    <a href="main.html" class="header-logo" title="LuxeCart Home">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.16 14.26l.04-.12.96-1.74h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0020.07 4H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7.42c-.13 0-.22-.09-.22-.22l-.04-.26z"/>
      </svg>
    </a>
    <h1 class="store-name">LuxeCart</h1>
  </header>

  <!-- ── AUTHENTICATION PAGE WRAPPER ── -->
  <div class="auth-page">

    <!-- Login Card (glassmorphism effect) -->
    <div class="auth-card">

      <!-- Logo icon -->
      <div class="auth-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.16 14.26l.04-.12.96-1.74h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0020.07 4H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7.42c-.13 0-.22-.09-.22-.22l-.04-.26z"/>
        </svg>
      </div>

      <!-- Title -->
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your LuxeCart account</p>

      <!-- Login Form -->
      <form id="login-form" autocomplete="off">
        <!-- Login (username) field -->
        <div class="form-group">
          <label for="login-input" class="form-label">Login</label>
          <input type="text" id="login-input" class="form-input"
                 placeholder="Enter your login" required autofocus>
        </div>

        <!-- Password field -->
        <div class="form-group">
          <label for="password-input" class="form-label">Password</label>
          <input type="password" id="password-input" class="form-input"
                 placeholder="Enter your password" required>
        </div>

        <!-- Submit button -->
        <button type="submit" class="btn-login" id="btn-login">
          Sign In →
        </button>

        <!-- Error message (hidden by default, shown on failed login) -->
        <div id="error-message" class="error-message" role="alert">
          Invalid login or password.
        </div>
      </form>

      <!-- Demo credentials hint -->
      <div class="auth-hint">
        Demo: <strong>admin / admin123</strong> or <strong>customer1 / pass1234</strong>
      </div>

    </div><!-- /.auth-card -->

  </div><!-- /.auth-page -->

  <!-- External JavaScript -->
  <script src="script.js"></script>
</body>
</html>
